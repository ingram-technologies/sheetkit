name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: rustup component add rustfmt
      - run: cargo fmt --all --check

  test:
    name: test (native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  wasm:
    name: check (wasm32)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: rustup target add wasm32-unknown-unknown
      # The core crate and the bindings must keep building without the xlsx
      # feature (its zip dependency compiles C, which wasm32 can't).
      - run: cargo check --target wasm32-unknown-unknown -p sheetkit --no-default-features
      - run: cargo check --target wasm32-unknown-unknown -p sheetkit-wasm
